<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f9ff"/>
      <stop offset="100%" stop-color="#f6fdff"/>
    </linearGradient>
    <filter id="sd" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#2f7f9922"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>

  <g filter="url(#sd)">
    <rect x="130" y="140" width="1020" height="430" rx="30" fill="#d4f3ff" stroke="#4ba8c8" stroke-width="8"/>
  </g>

  <!-- Robot -->
  <g transform="translate(300,360)">
    <rect x="-85" y="-80" width="170" height="160" rx="26" fill="#8bc9e8" stroke="#3f7e9f" stroke-width="8"/>
    <circle cx="-30" cy="-18" r="14" fill="#244d66"/>
    <circle cx="30" cy="-18" r="14" fill="#244d66"/>
    <rect x="-40" y="25" width="80" height="22" rx="10" fill="#2e5f7c"/>
    <line x1="0" y1="-80" x2="0" y2="-116" stroke="#3f7e9f" stroke-width="8"/>
    <circle cx="0" cy="-126" r="12" fill="#ffd24d"/>
  </g>

  <!-- Alert icons -->
  <polygon points="640,220 665,270 615,270" fill="#ffb53d" stroke="#d38b20" stroke-width="6"/>
  <rect x="850" y="200" width="120" height="120" rx="20" fill="#b3e8ff" stroke="#4d9ec0" stroke-width="7"/>
  <path d="M870 290 L930 230" stroke="#4d9ec0" stroke-width="7"/>
  <circle cx="1030" cy="250" r="52" fill="#ffe28a" stroke="#d3aa3f" stroke-width="7"/>
  <polygon points="1030,214 1042,244 1074,244 1048,264 1058,296 1030,276 1002,296 1012,264 986,244 1018,244" fill="#f2b52e"/>

  <!-- Arrows showing chain progression -->
  <g stroke="#2f8099" stroke-width="8" stroke-linecap="round">
    <line x1="500" y1="360" x2="630" y2="250"/>
    <line x1="700" y1="250" x2="830" y2="250"/>
    <line x1="975" y1="250" x2="1085" y2="250"/>
  </g>
  <polygon points="630,250 606,240 614,266" fill="#2f8099"/>
  <polygon points="830,250 806,240 806,266" fill="#2f8099"/>
  <polygon points="1085,250 1061,240 1061,266" fill="#2f8099"/>

  <!-- Safe path line (else branch) -->
  <path d="M390 445 C520 540 860 540 1010 460" fill="none" stroke="#58b672" stroke-width="10" stroke-linecap="round"/>
  <polygon points="1010,460 980,454 992,480" fill="#58b672"/>
</svg>
