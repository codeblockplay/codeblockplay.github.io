<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dff8ff"/>
      <stop offset="100%" stop-color="#f3fff6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#265c3322"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#sky)"/>

  <!-- jungle canopy blobs -->
  <ellipse cx="170" cy="80" rx="150" ry="70" fill="#b7efc0"/>
  <ellipse cx="1150" cy="95" rx="170" ry="74" fill="#a8e9b6"/>
  <ellipse cx="620" cy="60" rx="220" ry="60" fill="#c6f4ce"/>

  <!-- start trail -->
  <path d="M150 540 C320 520 420 500 520 460" stroke="#cc9d58" stroke-width="26" fill="none" stroke-linecap="round"/>

  <!-- split path: bridge route and detour route -->
  <path d="M520 460 C650 390 760 340 900 280" stroke="#cb9b55" stroke-width="22" fill="none" stroke-linecap="round"/>
  <path d="M520 460 C650 560 760 600 930 560" stroke="#c08f4d" stroke-width="22" fill="none" stroke-linecap="round"/>

  <!-- river across upper path -->
  <path d="M620 360 C760 330 900 350 1060 310" stroke="#69c2ff" stroke-width="70" fill="none" stroke-linecap="round" opacity="0.9"/>

  <!-- bridge (open vs closed hint) -->
  <g filter="url(#shadow)">
    <rect x="780" y="275" width="170" height="60" rx="12" fill="#8d6b45"/>
    <line x1="792" y1="300" x2="940" y2="300" stroke="#d5b48b" stroke-width="6"/>
    <line x1="792" y1="320" x2="940" y2="320" stroke="#d5b48b" stroke-width="6"/>
  </g>
  <!-- lock/unlock icons -->
  <g transform="translate(740,250)">
    <rect x="0" y="18" width="34" height="28" rx="6" fill="#ffce57" stroke="#bd8e21" stroke-width="4"/>
    <path d="M7 18 V10 C7 1 27 1 27 10 V18" fill="none" stroke="#bd8e21" stroke-width="4"/>
  </g>
  <g transform="translate(965,248)">
    <rect x="0" y="18" width="34" height="28" rx="6" fill="#8be19f" stroke="#2f9c4f" stroke-width="4"/>
    <path d="M7 18 V10 C7 1 27 1 27 10" fill="none" stroke="#2f9c4f" stroke-width="4"/>
  </g>

  <!-- detour arrows -->
  <g fill="#3f8a4f" stroke="#2e6f3d" stroke-width="3">
    <polygon points="700,575 730,560 730,590"/>
    <polygon points="790,585 820,570 820,600"/>
    <polygon points="880,582 910,567 910,597"/>
  </g>

  <!-- obstacle icon near split -->
  <g transform="translate(525,430)">
    <circle cx="0" cy="0" r="26" fill="#ff8f8f" stroke="#c44e4e" stroke-width="5"/>
    <line x1="-12" y1="-12" x2="12" y2="12" stroke="#ffffff" stroke-width="6"/>
    <line x1="12" y1="-12" x2="-12" y2="12" stroke="#ffffff" stroke-width="6"/>
  </g>

  <!-- destination -->
  <g transform="translate(1080,470)">
    <rect x="-52" y="-42" width="104" height="84" rx="14" fill="#ffd77d" stroke="#d4a640" stroke-width="6"/>
    <polygon points="0,-22 16,10 -16,10" fill="#c47c2f"/>
    <polygon points="0,-4 20,20 -20,20" fill="#8f5c22"/>
  </g>
</svg>
