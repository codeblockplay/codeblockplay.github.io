<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dff4ff"/>
      <stop offset="100%" stop-color="#f8fbff"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9fd8ff"/>
      <stop offset="100%" stop-color="#6ab6ff"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe7a6"/>
      <stop offset="100%" stop-color="#ffd36f"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c7f0d2"/>
      <stop offset="100%" stop-color="#8fdfab"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#2f6ca820"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Playful background blobs -->
  <circle cx="120" cy="110" r="55" fill="#bfe6ff"/>
  <circle cx="1180" cy="640" r="70" fill="#d9f4ff"/>
  <circle cx="1120" cy="90" r="48" fill="#ffe9b8"/>

  <!-- Chain cards without text -->
  <g filter="url(#shadow)">
    <rect x="130" y="160" width="1020" height="130" rx="28" fill="url(#cardA)" stroke="#4e95de" stroke-width="6"/>
    <rect x="130" y="315" width="1020" height="130" rx="28" fill="url(#cardB)" stroke="#d8a645" stroke-width="6"/>
    <rect x="130" y="470" width="1020" height="130" rx="28" fill="url(#cardC)" stroke="#5ab983" stroke-width="6"/>
  </g>

  <!-- Card 1: Rain -> Raincoat -->
  <g transform="translate(240,225)">
    <ellipse cx="0" cy="0" rx="48" ry="26" fill="#6f8db3"/>
    <ellipse cx="-24" cy="-14" rx="22" ry="18" fill="#6f8db3"/>
    <ellipse cx="22" cy="-16" rx="20" ry="16" fill="#6f8db3"/>
    <line x1="-30" y1="28" x2="-36" y2="48" stroke="#2f6ec4" stroke-width="5" stroke-linecap="round"/>
    <line x1="0" y1="28" x2="-6" y2="50" stroke="#2f6ec4" stroke-width="5" stroke-linecap="round"/>
    <line x1="30" y1="28" x2="24" y2="50" stroke="#2f6ec4" stroke-width="5" stroke-linecap="round"/>
  </g>
  <path d="M480 225 L565 225" stroke="#2d5d92" stroke-width="8" stroke-linecap="round"/>
  <polygon points="565,225 545,214 545,236" fill="#2d5d92"/>
  <g transform="translate(690,188)">
    <path d="M0 0 C26 8 40 30 40 56 L40 94 L-40 94 L-40 56 C-40 30 -26 8 0 0 Z" fill="#3e82d9" stroke="#2d65b4" stroke-width="6"/>
    <path d="M-16 40 L0 58 L16 40" fill="none" stroke="#b9dcff" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Card 2: Wind -> Jacket -->
  <g transform="translate(225,383)">
    <path d="M-50 -10 C-20 -30 20 -30 50 -10" fill="none" stroke="#5a84b6" stroke-width="8" stroke-linecap="round"/>
    <path d="M-70 14 C-30 -4 20 -4 70 14" fill="none" stroke="#5a84b6" stroke-width="8" stroke-linecap="round"/>
    <path d="M-44 38 C-16 26 16 26 44 38" fill="none" stroke="#5a84b6" stroke-width="8" stroke-linecap="round"/>
  </g>
  <path d="M480 380 L565 380" stroke="#7f5e1f" stroke-width="8" stroke-linecap="round"/>
  <polygon points="565,380 545,369 545,391" fill="#7f5e1f"/>
  <g transform="translate(675,346)">
    <path d="M0 0 L28 20 L28 100 L-28 100 L-28 20 Z" fill="#4a9fd4" stroke="#2f6c93" stroke-width="6"/>
    <rect x="-10" y="28" width="20" height="72" fill="#d0eeff"/>
    <line x1="0" y1="28" x2="0" y2="100" stroke="#2f6c93" stroke-width="4"/>
  </g>

  <!-- Card 3: Sun -> Cap -->
  <g transform="translate(235,538)">
    <circle cx="0" cy="0" r="34" fill="#ffd23f" stroke="#e6a817" stroke-width="6"/>
    <g stroke="#e6a817" stroke-width="6" stroke-linecap="round">
      <line x1="0" y1="-58" x2="0" y2="-80"/>
      <line x1="0" y1="58" x2="0" y2="80"/>
      <line x1="-58" y1="0" x2="-80" y2="0"/>
      <line x1="58" y1="0" x2="80" y2="0"/>
      <line x1="-42" y1="-42" x2="-58" y2="-58"/>
      <line x1="42" y1="-42" x2="58" y2="-58"/>
      <line x1="-42" y1="42" x2="-58" y2="58"/>
      <line x1="42" y1="42" x2="58" y2="58"/>
    </g>
  </g>
  <path d="M480 535 L565 535" stroke="#3f7c5b" stroke-width="8" stroke-linecap="round"/>
  <polygon points="565,535 545,524 545,546" fill="#3f7c5b"/>
  <g transform="translate(675,510)">
    <path d="M-52 24 C-20 -10 20 -10 52 24" fill="#ff8a65" stroke="#d75f38" stroke-width="6"/>
    <path d="M-70 24 L70 24" stroke="#d75f38" stroke-width="8" stroke-linecap="round"/>
    <circle cx="-8" cy="22" r="4" fill="#fff0d6"/>
  </g>
</svg>
