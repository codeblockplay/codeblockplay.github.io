<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-labelledby="title desc">
  <title id="title">Build a Snowman</title>
  <desc id="desc">A clean kid-friendly guide showing six snowman building steps and the final snowman result.</desc>

  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dff2ff"/>
      <stop offset="100%" stop-color="#eef8ff"/>
    </linearGradient>
    <linearGradient id="titleBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4ea9ff"/>
      <stop offset="100%" stop-color="#5b7dff"/>
    </linearGradient>
    <style>
      text {
        font-family: "Trebuchet MS", "Arial Rounded MT Bold", Arial, sans-serif;
      }
    </style>
  </defs>

  <rect width="800" height="600" fill="url(#sky)"/>
  <rect x="0" y="430" width="800" height="170" fill="#eef3f8"/>
  <ellipse cx="140" cy="456" rx="160" ry="34" fill="#f8fbff"/>
  <ellipse cx="430" cy="458" rx="220" ry="36" fill="#f8fbff"/>
  <ellipse cx="730" cy="452" rx="130" ry="28" fill="#f8fbff"/>

  <circle cx="720" cy="92" r="42" fill="#ffe27a" stroke="#f4bf39" stroke-width="4"/>
  <circle cx="720" cy="92" r="22" fill="#fff4c1"/>

  <rect x="28" y="24" width="744" height="84" rx="20" fill="url(#titleBar)"/>
  <text x="400" y="73" font-size="40" font-weight="900" text-anchor="middle" fill="#ffffff">Build a Snowman</text>
  <text x="400" y="96" font-size="18" font-weight="700" text-anchor="middle" fill="#eaf2ff">Follow each clear step to finish your snow buddy</text>

  <!-- Left panel: ordered steps -->
  <g transform="translate(34 128)">
    <rect width="418" height="432" rx="18" fill="#ffffff" stroke="#2f5d95" stroke-width="4"/>
    <rect x="0" y="0" width="418" height="56" rx="16" fill="#eaf3ff"/>
    <text x="209" y="37" font-size="24" font-weight="900" text-anchor="middle" fill="#2d578d">Snowman Steps</text>

    <g transform="translate(18 76)">
      <!-- 1 -->
      <rect x="0" y="0" width="382" height="52" rx="12" fill="#ecf6ff" stroke="#a7c5ea" stroke-width="2"/>
      <circle cx="24" cy="26" r="15" fill="#4f95ff"/><text x="24" y="32" font-size="18" font-weight="900" text-anchor="middle" fill="#fff">1</text>
      <circle cx="62" cy="27" r="10" fill="#ffffff" stroke="#9cb3c8" stroke-width="2"/>
      <text x="86" y="33" font-size="19" font-weight="900" fill="#2f5d95">Roll Large Ball</text>

      <!-- 2 -->
      <rect x="0" y="62" width="382" height="52" rx="12" fill="#f2f9ff" stroke="#bbd2ec" stroke-width="2"/>
      <circle cx="24" cy="88" r="15" fill="#57a0ff"/><text x="24" y="94" font-size="18" font-weight="900" text-anchor="middle" fill="#fff">2</text>
      <circle cx="62" cy="89" r="8" fill="#ffffff" stroke="#9cb3c8" stroke-width="2"/>
      <text x="86" y="95" font-size="19" font-weight="900" fill="#2f5d95">Roll Medium Ball</text>

      <!-- 3 -->
      <rect x="0" y="124" width="382" height="52" rx="12" fill="#f8fcff" stroke="#c6d9ee" stroke-width="2"/>
      <circle cx="24" cy="150" r="15" fill="#63acff"/><text x="24" y="156" font-size="18" font-weight="900" text-anchor="middle" fill="#fff">3</text>
      <circle cx="62" cy="151" r="6" fill="#ffffff" stroke="#9cb3c8" stroke-width="2"/>
      <text x="86" y="157" font-size="19" font-weight="900" fill="#2f5d95">Roll Small Ball</text>

      <!-- 4 -->
      <rect x="0" y="186" width="382" height="52" rx="12" fill="#f0fff1" stroke="#a9d4ab" stroke-width="2"/>
      <circle cx="24" cy="212" r="15" fill="#58b668"/><text x="24" y="218" font-size="18" font-weight="900" text-anchor="middle" fill="#fff">4</text>
      <circle cx="57" cy="208" r="3.5" fill="#2a3340"/>
      <circle cx="68" cy="208" r="3.5" fill="#2a3340"/>
      <text x="86" y="219" font-size="19" font-weight="900" fill="#2f7b42">Add Eyes</text>

      <!-- 5 -->
      <rect x="0" y="248" width="382" height="52" rx="12" fill="#fff7ea" stroke="#e2c48a" stroke-width="2"/>
      <circle cx="24" cy="274" r="15" fill="#f0a54a"/><text x="24" y="280" font-size="18" font-weight="900" text-anchor="middle" fill="#fff">5</text>
      <path d="M50 275 L74 268 L74 282 Z" fill="#ff9f39" stroke="#c56f18" stroke-width="2"/>
      <text x="86" y="281" font-size="19" font-weight="900" fill="#8a5f24">Add Carrot Nose</text>

      <!-- 6 -->
      <rect x="0" y="310" width="382" height="52" rx="12" fill="#f2f3ff" stroke="#bec3ee" stroke-width="2"/>
      <circle cx="24" cy="336" r="15" fill="#7b7fe6"/><text x="24" y="342" font-size="18" font-weight="900" text-anchor="middle" fill="#fff">6</text>
      <rect x="50" y="323" width="28" height="7" fill="#2f3744"/>
      <rect x="56" y="300" width="16" height="23" fill="#2f3744"/>
      <text x="86" y="343" font-size="19" font-weight="900" fill="#4f56a7">Add Hat</text>
    </g>
  </g>

  <!-- Right panel: final result -->
  <g transform="translate(470 128)">
    <rect width="296" height="432" rx="18" fill="#ffffff" stroke="#2f5d95" stroke-width="4"/>
    <rect x="0" y="0" width="296" height="56" rx="16" fill="#ecfff4"/>
    <text x="148" y="37" font-size="24" font-weight="900" text-anchor="middle" fill="#2f7d53">Final Snowman</text>

    <!-- Snowman -->
    <ellipse cx="148" cy="330" rx="84" ry="74" fill="#ffffff" stroke="#d1dce8" stroke-width="3"/>
    <ellipse cx="148" cy="220" rx="62" ry="54" fill="#ffffff" stroke="#d1dce8" stroke-width="3"/>
    <ellipse cx="148" cy="138" rx="44" ry="38" fill="#ffffff" stroke="#d1dce8" stroke-width="3"/>

    <!-- Face -->
    <circle cx="133" cy="131" r="4.5" fill="#2a3340"/>
    <circle cx="163" cy="131" r="4.5" fill="#2a3340"/>
    <path d="M148 141 L174 136 L174 146 Z" fill="#ff9f39" stroke="#c56f18" stroke-width="2"/>

    <!-- Buttons -->
    <circle cx="148" cy="211" r="4.5" fill="#2a3340"/>
    <circle cx="148" cy="229" r="4.5" fill="#2a3340"/>
    <circle cx="148" cy="248" r="4.5" fill="#2a3340"/>

    <!-- Arms -->
    <path d="M88 225 L46 208" stroke="#8f6b3d" stroke-width="5" stroke-linecap="round"/>
    <path d="M208 225 L248 210" stroke="#8f6b3d" stroke-width="5" stroke-linecap="round"/>

    <!-- Hat -->
    <rect x="118" y="94" width="60" height="11" fill="#2f3744"/>
    <rect x="128" y="66" width="40" height="28" fill="#2f3744"/>

    <!-- Ground shadow -->
    <ellipse cx="148" cy="402" rx="96" ry="18" fill="#e7eff8"/>

    <text x="148" y="420" font-size="18" font-weight="900" text-anchor="middle" fill="#3b679d">Three snowballs + eyes + nose + hat</text>
  </g>
</svg>
