<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pattern Sequencer - Brainy Puzzle Hub</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./pattern-sequencer.css">
    <link rel="stylesheet" href="../shared/shell.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="kp-shell-enabled" data-page="brainy-puzzles" data-age="Age 7-10">
    <header class="bg-info text-white py-3">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <h1 class="mb-0"><i class="fas fa-puzzle-piece"></i> Pattern Sequencer</h1>
                <nav>
                    <a href="../index.html" class="btn btn-light btn-sm me-2"><i class="fas fa-home"></i> Home</a>
                    <a href="../binary-decoder/index.html" class="btn btn-light btn-sm me-2"><i class="fas fa-laptop-code"></i> Binary Decoder</a>
                    <a href="../grid-explorer/index.html" class="btn btn-light btn-sm me-2"><i class="fas fa-th"></i> Grid Explorer</a>
                    <a href="../code-blocks/block-coding.html" class="btn btn-light btn-sm"><i class="fas fa-code"></i> Code Blocks</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="container my-4">
        <div class="card">
            <div class="card-header bg-info text-white d-flex justify-content-between align-items-center">
                <h3 class="mb-0">Pattern Sequencer</h3>
                <a href="../brainy-blocks/index.html" class="btn btn-warning btn-sm rounded-pill back-to-brainy-btn">
                    <i class="fas fa-brain"></i> Back to Puzzle Hub
                </a>
            </div>
            <div class="card-body">
                <div class="pattern-container mb-4">
                    <h5 class="mb-3">Complete the Pattern:</h5>
                    <div class="pattern-sequence" id="pattern-sequence"></div>
                    
                    <div class="pattern-workspace mt-4">
                        <h5>Your Workspace:</h5>
                        <div class="pattern-choices mt-2" id="pattern-choices"></div>
                        <div class="pattern-solution mt-3" id="pattern-solution"></div>
                        
                        <div class="mt-3 d-flex justify-content-center align-items-center flex-wrap gap-2">
                            <button id="pattern-prev" class="btn btn-outline-secondary pattern-icon-btn" title="Previous Pattern" aria-label="Previous Pattern">
                                <i class="fas fa-chevron-left"></i>
                            </button>
                            <button id="pattern-reset" class="btn btn-secondary pattern-icon-btn" title="Reset Current Answer" aria-label="Reset Current Answer">
                                <i class="fas fa-rotate-left"></i>
                            </button>
                            <button id="pattern-check" class="btn btn-info pattern-icon-btn" title="Check Pattern" aria-label="Check Pattern">
                                <i class="fas fa-check"></i>
                            </button>
                            <button id="pattern-next" class="btn btn-outline-primary pattern-icon-btn" title="Next Pattern" aria-label="Next Pattern">
                                <i class="fas fa-chevron-right"></i>
                            </button>
                        </div>
                    </div>

                    <div id="pattern-result" class="result-message text-center mt-3"></div>
                    <div id="pattern-explanation" class="pattern-explanation" aria-live="polite"></div>
                </div>

                <div class="progress mb-3">
                    <div class="progress-bar bg-info" id="sequence-progress" role="progressbar" style="width: 0%"></div>
                </div>

                <div class="text-center">
                    <span class="badge bg-info">Level: <span id="sequence-level">1</span></span>
                    <span class="badge bg-primary">Patterns Solved: <span id="sequence-solved">0</span>/<span id="sequence-total">10</span></span>
                    <span class="badge bg-warning text-dark">Attempts Left: <span id="sequence-attempts">3</span></span>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer mt-5">
        <div class="container text-center">
            <p class="mb-0">© 2025 Brainy Puzzle Hub | Designed with <i class="fas fa-heart text-danger"></i> for creative minds</p>
        </div>
    </footer>

    <!-- Bootstrap Bundle with Popper -->
    <script src="../shared/shell.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SortableJS - for drag and drop -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <!-- Custom JavaScript -->
    <script src="./pattern-sequencer.js"></script>
</body>
</html>
