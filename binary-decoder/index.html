<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binary Decoder Quest | Brainy Puzzle Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../shared/shell.css">
    <link rel="stylesheet" href="./binary-decoder.css">
</head>
<body class="kp-shell-enabled" data-page="brainy-puzzles" data-age="Binary Decoder Quest">
    <header>
        <h1>Binary Decoder Quest</h1>
    </header>

    <main class="decoder-main">
        <section class="decoder-card" aria-label="Binary Decoder Puzzle Game">
            <div class="decoder-title-row">
                <div class="decoder-title-copy">
                    <h1>Binary Decoder Quest</h1>
                </div>
                <div class="decoder-title-actions">
                    <a href="../brainy-blocks/index.html" class="parent-hub-btn">
                        <i class="fas fa-brain"></i>
                        <span>Back to Puzzle Hub</span>
                    </a>
                </div>
            </div>

            <div class="quality-panel">
                <div class="quality-row">
                    <div class="mode-switch" id="age-mode-buttons" role="tablist" aria-label="Age modes">
                        <button class="mode-btn" data-mode="easy" aria-selected="false">Age 5-6</button>
                        <button class="mode-btn active" data-mode="medium" aria-selected="true">Age 7-8</button>
                        <button class="mode-btn" data-mode="hard" aria-selected="false">Age 9-10</button>
                    </div>
                    <div class="score-strip" aria-live="polite">
                        <span>Score: <strong id="score-value">0</strong></span>
                        <span>Level: <strong id="level-value">1</strong></span>
                        <span>Solved: <strong id="solved-value">0</strong></span>
                        <span>Streak: <strong id="streak-value">0</strong></span>
                        <span>Hints: <strong id="hints-value">0</strong></span>
                        <span>Attempts Left: <strong id="attempts-value">3</strong></span>
                    </div>
                </div>
            </div>

            <div class="play-area">
                <div class="decode-stage">
                    <div id="binary-word" class="binary-word" aria-label="Binary word puzzle"></div>

                    <div class="answer-wrap" aria-label="Answer area">
                        <div id="answer-boxes" class="answer-boxes"></div>
                        <div id="letter-bank" class="letter-bank"></div>
                    </div>

                    <div class="reference-wrap" id="reference-wrap">
                        <div id="reference-grid" class="reference-grid" aria-label="Binary reference table"></div>
                    </div>
                </div>

                <aside class="side-panel" aria-label="Game controls and feedback">
                    <div class="hint-controls">
                        <button id="hint-btn" class="hint-btn" type="button" title="Get hint" aria-label="Get hint" data-tooltip="Hint">
                            <i class="fas fa-lightbulb"></i>
                        </button>
                        <button id="speak-btn" class="speak-btn" type="button" title="Speak word" aria-label="Speak word" data-tooltip="Sound" disabled>
                            <i class="fas fa-volume-high"></i>
                        </button>
                    </div>

                    <div id="decoder-stamp" class="decoder-stamp" aria-hidden="true"></div>
                    <p id="hint-message" class="hint-message" aria-live="polite"></p>

                    <div id="decoder-result" class="result-message" aria-live="polite"></div>
                    <div id="decoder-explanation" class="explanation-message" aria-live="polite"></div>

                    <div class="control-row" aria-label="Word navigation controls">
                        <button id="decoder-prev" class="icon-btn" type="button" title="Previous word" aria-label="Previous word">
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <button id="decoder-reset" class="icon-btn" type="button" title="Reset answer" aria-label="Reset answer">
                            <i class="fas fa-rotate-left"></i>
                        </button>
                        <button id="decoder-check" class="icon-btn check-btn" type="button" title="Check answer" aria-label="Check answer">
                            <i class="fas fa-check"></i>
                        </button>
                        <button id="decoder-next" class="icon-btn" type="button" title="Next word" aria-label="Next word">
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                </aside>
            </div>
        </section>
    </main>

    <script src="../shared/shell.js" defer></script>
    <script src="./binary-decoder.js" defer></script>
</body>
</html>
